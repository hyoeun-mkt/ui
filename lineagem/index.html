<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>лҰ¬лӢҲм§ҖM кі„м • нҢҗл§Ө</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { height: 100%; margin: 0; padding: 0; background: #020816; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  select option { background: #202d4d; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.2s ease both; }
</style>
</head>
<body>
<div id="root" class="min-h-screen bg-[#020816] lg:px-6 lg:py-6"></div>

<script>
// в”Җв”Җв”Җ лҚ°мқҙн„° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const legacyServers = ["лҚ°нҸ¬лЎңмҘ¬","нҢҗлҸ„лқј","л“ҖнҒ¬лҚ°н•„","нҢҢн‘ёлҰ¬мҳЁ","лҰ°л“ңл№„мҳӨлҘҙ","кө°н„°","н•ҳл”ҳ","м•„нҲ°","мјҖл ҲлӢҲмҠӨ","мқҙмӢӨлЎңн…Ң","мј„лқјмҡ°н—¬","лҚ°мҠӨлӮҳмқҙнҠё","м•ҲнғҖлқјмҠӨ","л°ңлқјм№ҙмҠӨ","мӮ¬мқҙн•ҳ","м§ҲлҰ¬м–ё","лё”лЈЁл””м№ҙ","лқјмҠӨнғҖл°”л“ң","кё°лҘҙнғҖмҠӨ","м§„ кё°лҘҙнғҖмҠӨ","к·ёлҰјлҰ¬нҚј","л°ңлЎқ"];
const rebootServers = ["л§җн•ҳлҠ” м„¬","мңҲлӢӨмҡ°л“ң","кёҖлЈЁл””мҳӨ","к·ёл ҲмӢңм•„"];
const serverOptions = [...legacyServers, ...rebootServers];
const serverDetails = Array.from({length:12},(_,i)=>`${String(i+1).padStart(2,"0")}`);
const classOptions = ["кё°мӮ¬","л§ҲкІҖмӮ¬","мӮ¬мӢ ","лҮҢмӢ ","кө°мЈј","кҙ‘м „мӮ¬","нҲ¬мӮ¬","м•”нқ‘кё°мӮ¬","мӢ м„ұкІҖмӮ¬","лӢӨнҒ¬м—ҳн”„","мҡ”м •","мҙқмӮ¬","л§ҲлІ•мӮ¬"];
const statFields = [["STR","нһҳ"],["DEX","лҜјмІ©"],["CON","мІҙл Ҙ"],["INT","м§ҖлҠҘ"],["WIS","м§Җнҳң"],["CHA","л§Өл Ҙ"]];
const uploadSlots = ["мәҗлҰӯн„° м •ліҙ","мҠӨнғҜ","мҠӨнӮ¬","мһҘл№„","ліҖмӢ ","л§ҲлІ•мқёнҳ•","м„ұл¬ј","мһ¬нҷ”"];

// в”Җв”Җв”Җ мғҒнғң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let step = 0;
let isBartemImportOpen = false;
let bartemUrl = "";
let form = {
  server:"", serverDetail:"", characterName:"", className:"",
  level:"", combatPower:"", price:"", accountType:"кө¬кёҖ", accountHistory:"ліёмқё 1лҢҖ",
  paymentHistory:false, doubleLinked:false, noDoubleLinked:false, giftAvailable:false, recoverySafe:false, sanctionFree:false, hasCustomerId:false,
  nearbyDamage:"", rangedDamage:"", accuracy:"", sp:"", ac:"", mr:"",
  str:"", dex:"", con:"", int:"", wis:"", cha:"",
  mythSkill:"", legendSkill:"", heroSkill:"", mainSkills:"",
  transformInfo:"", dollInfo:"", relicInfo:"",
  weapon:"", armor:"", accessories:"",
  adena:"", diamond:"", collection:"",
  tradeMethod:"мқҙл©”мқј ліҖкІҪ нӣ„ мқёкі„", afterSupport:"1нҡҢ м§Җмӣҗ", description:""
};

const steps = [
  {title:"кё°ліё м •ліҙ"},{title:"кё°ліё кұ°лһҳ м •ліҙ"},{title:"м „нҲ¬ мҠӨнҺҷ"},
  {title:"мҠӨнӮ¬ / ліҙмң  мҡ”мҶҢ"},{title:"мһҘл№„ / мһ¬нҷ”"},{title:"кұ°лһҳ м •ліҙ"},
  {title:"мҰқл№ҷ л“ұлЎқ"},{title:"мөңмў… нҷ•мқё"}
];

// в”Җв”Җв”Җ мң нҡЁм„ұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function isStepComplete(idx) {
  switch(idx) {
    case 0: return !!(form.server && form.serverDetail && form.characterName && form.className);
    case 1: return !!(form.level && form.combatPower && form.price);
    case 2: {
      const ranged = ["мҡ”м •","мҙқмӮ¬"].includes(form.className);
      return !!(form.accuracy && form.sp && (ranged ? form.rangedDamage : form.nearbyDamage));
    }
    case 3: return !!(form.mythSkill||form.legendSkill||form.heroSkill||form.transformInfo||form.dollInfo||form.relicInfo);
    case 4: return !!(form.weapon||form.armor||form.accessories||form.adena||form.diamond||form.collection);
    case 5: return !!(form.tradeMethod && form.afterSupport);
    case 6: return false;
    default: return false;
  }
}

// в”Җв”Җв”Җ CSS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const sectionCard = "rounded-[20px] border border-slate-700/80 bg-[#121d3a]";
const labelClass = "mb-2 block text-sm font-semibold text-slate-200";
const inputClass = "w-full rounded-2xl border border-slate-700 bg-[#202d4d] px-4 py-3.5 text-sm text-white placeholder:text-slate-500 focus:border-amber-400 focus:outline-none";

// в”Җв”Җв”Җ update: мҠӨнҒ¬лЎӨ мң м§Җн•ҳл©° л¶Җл¶„ м—…лҚ°мқҙнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function update(key, value) {
  form[key] = value;
  if (key === 'server') { form.serverDetail = ''; renderContent(); }
  else { updateChoiceBtns(key); }
  updateHeader();
  updateBottomBar();
}

// choiceBtn м„ нғқ мғҒнғңл§Ң DOMм—җм„ң м§Ғм ‘ к°ұмӢ 
function updateChoiceBtns(key) {
  document.querySelectorAll(`[data-choice-key="${key}"]`).forEach(btn => {
    const active = btn.dataset.choiceValue === form[key];
    btn.className = `rounded-2xl border px-4 py-3 text-sm font-bold transition ${
      active ? "border-amber-400 bg-amber-500/15 text-amber-300" : "border-slate-700 bg-[#1b2745] text-slate-200"
    }`;
  });
}

function toggle(key) {
  form[key] = !form[key];
  updateToggleBtn(key);
  updateHeader();
  updateBottomBar();
}

// нҶ кёҖ лІ„нҠјл§Ң көҗмІҙ
function updateToggleBtn(key) {
  const btn = document.querySelector(`[data-toggle="${key}"]`);
  if (!btn) return;
  const invert = btn.dataset.invert === "true";
  const val = invert ? !form[key] : form[key];
  btn.querySelector('.toggle-track').className = `toggle-track relative h-7 w-12 rounded-full transition ${val?"bg-emerald-400":"bg-slate-600"}`;
  btn.querySelector('.toggle-thumb').className = `toggle-thumb absolute top-1 h-5 w-5 rounded-full bg-white transition ${val?"left-6":"left-1"}`;
}

// н—ӨлҚ” мғҒнғңл§Ң к°ұмӢ 
function updateHeader() {
  const complete = isStepComplete(step);
  steps.forEach((_, idx) => {
    const btn = document.querySelector(`[data-step-index="${idx}"]`);
    if (!btn) return;
    const active = idx === step;
    const done = idx < step && isStepComplete(idx);
    btn.className = `flex items-center gap-2 rounded-full border px-3 py-2 text-xs font-bold transition ${
      done ? "border-emerald-400 bg-emerald-500/15 text-emerald-300"
      : active ? "border-amber-400 bg-amber-500/15 text-amber-300"
      : "border-slate-700 bg-[#1b2745] text-slate-300"}`;
    const dot = btn.querySelector('.step-dot');
    if (dot) dot.className = `step-dot flex h-5 w-5 items-center justify-center rounded-full text-[11px] ${
      done?"bg-emerald-400 text-slate-950":active?"bg-amber-400 text-slate-950":"bg-slate-700 text-white"}`;
  });
  const warn = document.getElementById("step-warn");
  if (warn) warn.style.display = (!complete && step < steps.length-1) ? "" : "none";
}

// н•ҳлӢЁ лІ„нҠј мғҒнғңл§Ң к°ұмӢ 
function updateBottomBar() {
  const complete = isStepComplete(step);
  const isLast = step === steps.length - 1;
  const nextBtn = document.getElementById("btn-next");
  if (!nextBtn) return;
  nextBtn.className = (!isLast && !complete)
    ? "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500/40 text-slate-800 cursor-not-allowed"
    : "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500 text-slate-950";
}

function updatePrevBtn() {
  const btn = document.getElementById("btn-prev");
  if (!btn) return;
  btn.disabled = step === 0;
  btn.className = step === 0
    ? "w-[160px] rounded-2xl border px-5 py-4 text-sm font-bold text-center border-slate-800 bg-slate-900 text-slate-600 cursor-not-allowed"
    : "w-[160px] rounded-2xl border px-5 py-4 text-sm font-bold text-center border-slate-700 bg-[#1b2745] text-slate-100";
}

// в”Җв”Җв”Җ мҠӨн…қ мқҙлҸҷ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setStep(idx) {
  step = idx;
  renderContent();
  updateHeader();
  updateBottomBar();
  updatePrevBtn();
  // лӢӨмқҢ лІ„нҠј onclick көҗмІҙ (л§Ҳм§Җл§ү мҠӨн…қ м—¬л¶Җ)
  const nextBtn = document.getElementById("btn-next");
  if (nextBtn) {
    nextBtn.textContent = (idx === steps.length-1) ? "нҢҗл§Ө л“ұлЎқн•ҳкё°" : "лӢӨмқҢ вҶ’";
    nextBtn.onclick = (idx === steps.length-1) ? ()=>alert('нҢҗл§Ө л“ұлЎқмқҙ мҷ„лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ!') : goNext;
  }
  setTimeout(() => {
    const ca = document.getElementById("content-area");
    if (ca) ca.scrollTop = 0;
    const btn = document.querySelector(`[data-step-index="${idx}"]`);
    if (btn) btn.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
  }, 30);
}

function goNext() {
  if (step < steps.length-1 && !isStepComplete(step)) return;
  setStep(Math.min(step+1, steps.length-1));
}
function goPrev() { setStep(Math.max(step-1, 0)); }

// в”Җв”Җв”Җ н—¬нҚј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function toggleRow(label, key, invert=false) {
  const val = invert ? !form[key] : form[key];
  return `
  <button type="button" data-toggle="${key}" data-invert="${invert}" onclick="toggle('${key}')"
    class="flex w-full items-center justify-between rounded-2xl border border-slate-700 bg-[#1b2745] px-4 py-4 text-left">
    <span class="text-sm font-medium text-slate-100">${label}</span>
    <span class="toggle-track relative h-7 w-12 rounded-full transition ${val?"bg-emerald-400":"bg-slate-600"}">
      <span class="toggle-thumb absolute top-1 h-5 w-5 rounded-full bg-white transition ${val?"left-6":"left-1"}"></span>
    </span>
  </button>`;
}

function choiceBtn(key, value, label) {
  const active = form[key] === value;
  return `<button type="button" data-choice-key="${key}" data-choice-value="${value}" onclick="selectChoice(this)" class="rounded-2xl border px-4 py-3 text-sm font-bold transition ${active?"border-amber-400 bg-amber-500/15 text-amber-300":"border-slate-700 bg-[#1b2745] text-slate-200"}">${label}</button>`;
}

function selectChoice(btn) {
  const key = btn.dataset.choiceKey;
  const value = btn.dataset.choiceValue;
  update(key, value);
}

// в”Җв”Җв”Җ мҠӨн…қ HTML в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderStep0() {
  const serverOpts = serverOptions.map(s=>`<option${form.server===s?" selected":""}>${s}</option>`).join("");
  const detailOpts = serverDetails.map(d=>`<option${form.serverDetail===d?" selected":""}>${d}</option>`).join("");
  const classOpts = classOptions.map(c=>`<option${form.className===c?" selected":""}>${c}</option>`).join("");
  const bartemPanel = isBartemImportOpen ? `
    <div class="mt-4 rounded-2xl border border-slate-600 bg-[#202d4d] p-4">
      <div class="text-sm font-bold text-white">л°”лЎңн…ң мғҒн’Ҳ л¶Ҳлҹ¬мҳӨкё°</div>
      <div class="mt-1 text-xs leading-5 text-slate-400">л°”лЎңн…ңм—җ л“ұлЎқлҗң мғҒн’Ҳ URLмқ„ мһ…л Ҙн•ҳл©ҙ л“ұлЎқ м •ліҙлҘј мһҗлҸҷмңјлЎң л°ҳмҳҒн•  мҲҳ мһҲлҸ„лЎқ м—°кІ°н•ҳлҠ” мҳҒм—ӯмһ…лӢҲлӢӨ.</div>
      <div class="mt-3 space-y-3">
        <input class="${inputClass}" value="${bartemUrl}" oninput="bartemUrl=this.value" placeholder="л°”лЎңн…ң мғҒн’Ҳ URL мһ…л Ҙ"/>
        <div class="flex gap-2">
          <button type="button" ${!bartemUrl.trim()?"disabled":""} class="flex-1 rounded-xl px-4 py-3 text-sm font-bold ${bartemUrl.trim()?"bg-amber-500 text-slate-950":"bg-amber-500/40 text-slate-800 cursor-not-allowed"}">л“ұлЎқ м •ліҙ л¶Ҳлҹ¬мҳӨкё°</button>
          <button type="button" onclick="isBartemImportOpen=false;bartemUrl='';renderContent()" class="rounded-xl border border-slate-600 px-4 py-3 text-sm font-bold text-slate-200">лӢ«кё°</button>
        </div>
      </div>
    </div>` : "";
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">м„ңлІ„ / нҒҙлһҳмҠӨ</h2>
      <div class="space-y-4">
        <div><label class="${labelClass}">м„ңлІ„ м„ нғқ</label>
          <select class="${inputClass}" onchange="update('server',this.value)">
            <option value="">м„ңлІ„ м„ нғқ</option>${serverOpts}
          </select></div>
        ${form.server?`<div><label class="${labelClass}">м„ңлІ„ мғҒм„ё</label>
          <select class="${inputClass}" onchange="update('serverDetail',this.value)">
            <option value="">м„ңлІ„ мғҒм„ё м„ нғқ</option>${detailOpts}
          </select></div>`:""}
        <div><label class="${labelClass}">мәҗлҰӯн„°лӘ…</label>
          <input class="${inputClass}" data-key="characterName" value="${form.characterName}" oninput="update('characterName',this.value)" placeholder="мәҗлҰӯн„°лӘ… мһ…л Ҙ"/></div>
        <div><label class="${labelClass}">нҒҙлһҳмҠӨ м„ нғқ</label>
          <select class="${inputClass}" onchange="update('className',this.value)">
            <option value="">нҒҙлһҳмҠӨ м„ нғқ</option>${classOpts}
          </select></div>
        <div class="rounded-2xl border border-slate-700 bg-[#1b2745] p-4">
          <button type="button" onclick="isBartemImportOpen=!isBartemImportOpen;renderContent()" class="w-full rounded-xl bg-sky-500 px-4 py-3 text-sm font-bold text-white transition hover:bg-sky-400">л°”лЎңн…ңм—җ л“ұлЎқлҗң м •ліҙ к°Җм ёмҳӨкё°</button>
          <div class="mt-2 text-xs text-slate-400">* л“ұлЎқлҗң м •ліҙлҘј л°ҳмҳҒн•ҳм—¬ мһҗлҸҷмңјлЎң мһ…л Ҙлҗ©лӢҲлӢӨ</div>
          ${bartemPanel}
        </div>
      </div>
    </section>
  </div>`;
}

function renderStep1() {
  const accountTypes = ["кө¬кёҖ","нҚјн”Ң","м „нҷ”лІҲнҳё","нҺҳмқҙмҠӨл¶Ғ","м—”м”Ё"];
  const accountHistories = ["ліёмқё 1лҢҖ","кұ°лһҳ мқҙл Ҙ мһҲмқҢ"];

// в”Җв”Җв”Җ мҪҳн…җмё  мҳҒм—ӯл§Ң көҗмІҙ (мҠӨнҒ¬лЎӨ мң„м№ҳ мң м§Җ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderContent() {
  const area = document.getElementById("content-area");
  if (!area) return;
  // нҸ¬м»ӨмҠӨ мӨ‘мқё inputмқҳ keyмҷҖ selectionStartлҘј кё°м–ө
  const focused = document.activeElement;
  const focusKey = focused ? focused.dataset.key : null;
  const focusSel = focused ? focused.selectionStart : null;

  area.innerHTML = `<div class="fade-up max-w-2xl mx-auto">${getStepHTML()}</div>`;

  // нҸ¬м»ӨмҠӨ ліөмӣҗ
  if (focusKey) {
    const el = area.querySelector(`[data-key="${focusKey}"]`);
    if (el) {
      el.focus();
      if (focusSel !== null && el.setSelectionRange) {
        try { el.setSelectionRange(focusSel, focusSel); } catch(e){}
      }
    }
  }
}

// в”Җв”Җв”Җ мөңмҙҲ м „мІҙ л ҢлҚ” (1нҡҢл§Ң мӢӨн–ү) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderAll() {
  const complete = isStepComplete(step);
  const isLast = step === steps.length - 1;

  const navBtns = steps.map((item,idx) => {
    const active = idx === step;
    const done = idx < step && isStepComplete(idx);
    const cls = done ? "border-emerald-400 bg-emerald-500/15 text-emerald-300"
      : active ? "border-amber-400 bg-amber-500/15 text-amber-300"
      : "border-slate-700 bg-[#1b2745] text-slate-300";
    const dotCls = done ? "bg-emerald-400 text-slate-950" : active ? "bg-amber-400 text-slate-950" : "bg-slate-700 text-white";
    return `<button type="button" data-step-index="${idx}" onclick="setStep(${idx})"
      class="flex items-center gap-2 rounded-full border px-3 py-2 text-xs font-bold transition ${cls}">
      <span class="step-dot flex h-5 w-5 items-center justify-center rounded-full text-[11px] ${dotCls}">${done?"вң“":idx+1}</span>
      <span>${item.title}</span>
    </button>`;
  }).join("");

  const prevCls = "w-[160px] rounded-2xl border px-5 py-4 text-sm font-bold text-center border-slate-800 bg-slate-900 text-slate-600 cursor-not-allowed";
  const nextCls = (!isLast && !complete)
    ? "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500/40 text-slate-800 cursor-not-allowed"
    : "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500 text-slate-950";

  document.getElementById("root").innerHTML = `
  <div class="mx-auto h-[100dvh] w-full overflow-hidden bg-[#091431] text-white shadow-[0_30px_80px_rgba(0,0,0,0.45)] flex flex-col lg:h-[calc(100dvh-48px)] lg:max-w-[1280px] lg:rounded-[32px] lg:border lg:border-slate-800">

    <div class="shrink-0 border-b border-slate-800 bg-[#091431]/95 px-4 pb-4 pt-5 backdrop-blur lg:px-6 lg:pb-5 lg:pt-6">
      <div class="max-w-2xl mx-auto">
        <div class="mb-4 flex items-center gap-3 lg:mb-5">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-[#0ea5e9] shadow-md">
            <span class="text-lg font-black text-white">M</span>
          </div>
          <h1 class="text-[26px] font-black tracking-tight text-white lg:text-[30px]">лҰ¬лӢҲм§ҖM кі„м • нҢҗл§Ө</h1>
        </div>
        <div id="step-nav-wrap" class="overflow-x-auto pb-1 hide-scrollbar cursor-grab active:cursor-grabbing select-none">
          <div id="step-nav" class="flex min-w-max items-center gap-2">${navBtns}</div>
        </div>
        <div class="mt-4">
          <div class="text-xs font-semibold text-slate-400">STEP ${step+1} / ${steps.length}</div>
          <div id="step-title" class="mt-1 text-lg font-black text-white">${steps[step].title}</div>
          <div id="step-warn" class="mt-1 text-xs text-rose-300" style="${(!complete && step < steps.length-1)?'':'display:none'}">н•„мҲҳ мһ…л Ҙк°’мқ„ мұ„мӣҢм•ј лӢӨмқҢ лӢЁкі„лЎң мқҙлҸҷн•  мҲҳ мһҲмҠөлӢҲлӢӨ.</div>
        </div>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <div id="content-area" class="flex-1 overflow-y-auto px-4 py-4 hide-scrollbar lg:px-6 lg:py-5">
        <div class="fade-up max-w-2xl mx-auto">${getStepHTML()}</div>
      </div>
    </div>

    <div class="shrink-0 border-t border-slate-800 bg-[#091431]/95 px-4 py-4 backdrop-blur lg:px-6 lg:py-5">
      <div class="max-w-2xl mx-auto flex justify-center gap-3">
        <button id="btn-prev" type="button" onclick="goPrev()" disabled class="${prevCls}">вҶҗ мқҙм „</button>
        <button id="btn-next" type="button" class="${nextCls}">${isLast?"нҢҗл§Ө л“ұлЎқн•ҳкё°":"лӢӨмқҢ вҶ’"}</button>
      </div>
    </div>
  </div>`;

  // btn-next onclick м„Өм •
  const nextBtn = document.getElementById("btn-next");
  nextBtn.onclick = isLast ? ()=>alert('нҢҗл§Ө л“ұлЎқмқҙ мҷ„лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ!') : goNext;

  // мҠӨн…қ л„Өл№„ мҠӨмҷҖмқҙн”„ (л§Ҳмҡ°мҠӨ + н„°м№ҳ)
  const navWrap = document.getElementById("step-nav-wrap");
  if (navWrap) {
    let isDown = false, startX = 0, scrollLeft = 0;
    navWrap.addEventListener("mousedown", e => {
      isDown = true; startX = e.pageX - navWrap.offsetLeft; scrollLeft = navWrap.scrollLeft;
    });
    navWrap.addEventListener("mouseleave", () => isDown = false);
    navWrap.addEventListener("mouseup", () => isDown = false);
    navWrap.addEventListener("mousemove", e => {
      if (!isDown) return; e.preventDefault();
      navWrap.scrollLeft = scrollLeft - (e.pageX - navWrap.offsetLeft - startX);
    });
    navWrap.addEventListener("touchstart", e => {
      startX = e.touches[0].pageX; scrollLeft = navWrap.scrollLeft;
    }, {passive:true});
    navWrap.addEventListener("touchmove", e => {
      navWrap.scrollLeft = scrollLeft - (e.touches[0].pageX - startX);
