<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>리니지M 계정 판매</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { height: 100%; margin: 0; padding: 0; background: #020816; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  select option { background: #202d4d; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.2s ease both; }
</style>
</head>
<body>
<div id="root" class="min-h-screen bg-[#020816] lg:px-6 lg:py-6"></div>

<script>
// ─── 데이터 ────────────────────────────────────────────────────────────────────
const legacyServers = ["데포로쥬","판도라","듀크데필","파푸리온","린드비오르","군터","하딘","아툰","케레니스","이실로테","켄라우헬","데스나이트","안타라스","발라카스","사이하","질리언","블루디카","라스타바드","기르타스","진 기르타스","그림리퍼","발록"];
const rebootServers = ["말하는 섬","윈다우드","글루디오","그레시아"];
const serverOptions = [...legacyServers, ...rebootServers];
const serverDetails = Array.from({length:12},(_,i)=>`${String(i+1).padStart(2,"0")}`);
const classOptions = ["기사","마검사","사신","뇌신","군주","광전사","투사","암흑기사","신성검사","다크엘프","요정","총사","마법사"];
const statFields = [["STR","힘"],["DEX","민첩"],["CON","체력"],["INT","지능"],["WIS","지혜"],["CHA","매력"]];
const uploadSlots = ["캐릭터 정보","스탯","스킬","장비","변신","마법인형","성물","재화"];

// ─── 상태 ──────────────────────────────────────────────────────────────────────
let step = 0;
let isBartemImportOpen = false;
let bartemUrl = "";
let form = {
  server:"", serverDetail:"", characterName:"", className:"",
  level:"", combatPower:"", price:"", accountType:"구글", accountHistory:"본인 1대",
  paymentHistory:false, doubleLinked:false, giftAvailable:false, recoverySafe:false, sanctionFree:false,
  nearbyDamage:"", rangedDamage:"", accuracy:"", sp:"", ac:"", mr:"",
  str:"", dex:"", con:"", int:"", wis:"", cha:"",
  mythSkill:"", legendSkill:"", heroSkill:"", mainSkills:"",
  transformInfo:"", dollInfo:"", relicInfo:"",
  weapon:"", armor:"", accessories:"",
  adena:"", diamond:"", collection:"",
  tradeMethod:"이메일 변경 후 인계", afterSupport:"1회 지원", description:""
};

const steps = [
  {title:"기본 정보"},{title:"기본 거래 정보"},{title:"전투 스펙"},
  {title:"스킬 / 보유 요소"},{title:"장비 / 재화"},{title:"거래 정보"},
  {title:"증빙 등록"},{title:"최종 확인"}
];

// ─── 유효성 ───────────────────────────────────────────────────────────────────
function isStepComplete(idx) {
  switch(idx) {
    case 0: return !!(form.server && form.serverDetail && form.characterName && form.className);
    case 1: return !!(form.level && form.combatPower && form.price);
    case 2: {
      const ranged = ["요정","총사"].includes(form.className);
      return !!(form.accuracy && form.sp && (ranged ? form.rangedDamage : form.nearbyDamage));
    }
    case 3: return !!(form.mythSkill||form.legendSkill||form.heroSkill||form.transformInfo||form.dollInfo||form.relicInfo);
    case 4: return !!(form.weapon||form.armor||form.accessories||form.adena||form.diamond||form.collection);
    case 5: return !!(form.tradeMethod && form.afterSupport);
    case 6: return false;
    default: return false;
  }
}

// ─── CSS ──────────────────────────────────────────────────────────────────────
const sectionCard = "rounded-[20px] border border-slate-700/80 bg-[#121d3a]";
const labelClass = "mb-2 block text-sm font-semibold text-slate-200";
const inputClass = "w-full rounded-2xl border border-slate-700 bg-[#202d4d] px-4 py-3.5 text-sm text-white placeholder:text-slate-500 focus:border-amber-400 focus:outline-none";

// ─── update: 스크롤 유지하며 부분 업데이트 ────────────────────────────────────
function update(key, value) {
  form[key] = value;
  // 서버 변경 시 서버상세 리셋 + 콘텐츠 재렌더 필요
  if (key === 'server') { form.serverDetail = ''; renderContent(); }
  updateHeader();
  updateBottomBar();
}

function toggle(key) {
  form[key] = !form[key];
  updateToggleBtn(key);
  updateHeader();
  updateBottomBar();
}

// 토글 버튼만 교체
function updateToggleBtn(key) {
  const btn = document.querySelector(`[data-toggle="${key}"]`);
  if (!btn) return;
  const invert = btn.dataset.invert === "true";
  const val = invert ? !form[key] : form[key];
  btn.querySelector('.toggle-track').className = `toggle-track relative h-7 w-12 rounded-full transition ${val?"bg-emerald-400":"bg-slate-600"}`;
  btn.querySelector('.toggle-thumb').className = `toggle-thumb absolute top-1 h-5 w-5 rounded-full bg-white transition ${val?"left-6":"left-1"}`;
}

// 헤더 상태만 갱신
function updateHeader() {
  const complete = isStepComplete(step);
  steps.forEach((_, idx) => {
    const btn = document.querySelector(`[data-step-index="${idx}"]`);
    if (!btn) return;
    const active = idx === step;
    const done = idx < step && isStepComplete(idx);
    btn.className = `flex items-center gap-2 rounded-full border px-3 py-2 text-xs font-bold transition ${
      done ? "border-emerald-400 bg-emerald-500/15 text-emerald-300"
      : active ? "border-amber-400 bg-amber-500/15 text-amber-300"
      : "border-slate-700 bg-[#1b2745] text-slate-300"}`;
    const dot = btn.querySelector('.step-dot');
    if (dot) dot.className = `step-dot flex h-5 w-5 items-center justify-center rounded-full text-[11px] ${
      done?"bg-emerald-400 text-slate-950":active?"bg-amber-400 text-slate-950":"bg-slate-700 text-white"}`;
  });
  const warn = document.getElementById("step-warn");
  if (warn) warn.style.display = (!complete && step < steps.length-1) ? "" : "none";
}

// 하단 버튼 상태만 갱신
function updateBottomBar() {
  const complete = isStepComplete(step);
  const isLast = step === steps.length - 1;
  const nextBtn = document.getElementById("btn-next");
  if (!nextBtn) return;
  nextBtn.className = (!isLast && !complete)
    ? "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500/40 text-slate-800 cursor-not-allowed"
    : "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500 text-slate-950";
}

function updatePrevBtn() {
  const btn = document.getElementById("btn-prev");
  if (!btn) return;
  btn.disabled = step === 0;
  btn.className = step === 0
    ? "w-[160px] rounded-2xl border px-5 py-4 text-sm font-bold text-center border-slate-800 bg-slate-900 text-slate-600 cursor-not-allowed"
    : "w-[160px] rounded-2xl border px-5 py-4 text-sm font-bold text-center border-slate-700 bg-[#1b2745] text-slate-100";
}

// ─── 스텝 이동 ─────────────────────────────────────────────────────────────────
function setStep(idx) {
  step = idx;
  renderContent();
  updateHeader();
  updateBottomBar();
  updatePrevBtn();
  // 다음 버튼 onclick 교체 (마지막 스텝 여부)
  const nextBtn = document.getElementById("btn-next");
  if (nextBtn) {
    nextBtn.textContent = (idx === steps.length-1) ? "판매 등록하기" : "다음 →";
    nextBtn.onclick = (idx === steps.length-1) ? ()=>alert('판매 등록이 완료되었습니다!') : goNext;
  }
  setTimeout(() => {
    const ca = document.getElementById("content-area");
    if (ca) ca.scrollTop = 0;
    const btn = document.querySelector(`[data-step-index="${idx}"]`);
    if (btn) btn.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
  }, 30);
}

function goNext() {
  if (step < steps.length-1 && !isStepComplete(step)) return;
  setStep(Math.min(step+1, steps.length-1));
}
function goPrev() { setStep(Math.max(step-1, 0)); }

// ─── 헬퍼 ─────────────────────────────────────────────────────────────────────
function toggleRow(label, key, invert=false) {
  const val = invert ? !form[key] : form[key];
  return `
  <button type="button" data-toggle="${key}" data-invert="${invert}" onclick="toggle('${key}')"
    class="flex w-full items-center justify-between rounded-2xl border border-slate-700 bg-[#1b2745] px-4 py-4 text-left">
    <span class="text-sm font-medium text-slate-100">${label}</span>
    <span class="toggle-track relative h-7 w-12 rounded-full transition ${val?"bg-emerald-400":"bg-slate-600"}">
      <span class="toggle-thumb absolute top-1 h-5 w-5 rounded-full bg-white transition ${val?"left-6":"left-1"}"></span>
    </span>
  </button>`;
}

function choiceBtn(key, value, label) {
  const active = form[key] === value;
  return `<button type="button" onclick="update('${key}','${value}')" class="rounded-2xl border px-4 py-3 text-sm font-bold transition ${active?"border-amber-400 bg-amber-500/15 text-amber-300":"border-slate-700 bg-[#1b2745] text-slate-200"}">${label}</button>`;
}

// ─── 스텝 HTML ─────────────────────────────────────────────────────────────────
function renderStep0() {
  const serverOpts = serverOptions.map(s=>`<option${form.server===s?" selected":""}>${s}</option>`).join("");
  const detailOpts = serverDetails.map(d=>`<option${form.serverDetail===d?" selected":""}>${d}</option>`).join("");
  const classOpts = classOptions.map(c=>`<option${form.className===c?" selected":""}>${c}</option>`).join("");
  const bartemPanel = isBartemImportOpen ? `
    <div class="mt-4 rounded-2xl border border-slate-600 bg-[#202d4d] p-4">
      <div class="text-sm font-bold text-white">바로템 상품 불러오기</div>
      <div class="mt-1 text-xs leading-5 text-slate-400">바로템에 등록된 상품 URL을 입력하면 등록 정보를 자동으로 반영할 수 있도록 연결하는 영역입니다.</div>
      <div class="mt-3 space-y-3">
        <input class="${inputClass}" value="${bartemUrl}" oninput="bartemUrl=this.value" placeholder="바로템 상품 URL 입력"/>
        <div class="flex gap-2">
          <button type="button" ${!bartemUrl.trim()?"disabled":""} class="flex-1 rounded-xl px-4 py-3 text-sm font-bold ${bartemUrl.trim()?"bg-amber-500 text-slate-950":"bg-amber-500/40 text-slate-800 cursor-not-allowed"}">등록 정보 불러오기</button>
          <button type="button" onclick="isBartemImportOpen=false;bartemUrl='';renderContent()" class="rounded-xl border border-slate-600 px-4 py-3 text-sm font-bold text-slate-200">닫기</button>
        </div>
      </div>
    </div>` : "";
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">서버 / 클래스</h2>
      <div class="space-y-4">
        <div><label class="${labelClass}">서버 선택</label>
          <select class="${inputClass}" onchange="update('server',this.value)">
            <option value="">서버 선택</option>${serverOpts}
          </select></div>
        ${form.server?`<div><label class="${labelClass}">서버 상세</label>
          <select class="${inputClass}" onchange="update('serverDetail',this.value)">
            <option value="">서버 상세 선택</option>${detailOpts}
          </select></div>`:""}
        <div><label class="${labelClass}">캐릭터명</label>
          <input class="${inputClass}" data-key="characterName" value="${form.characterName}" oninput="update('characterName',this.value)" placeholder="캐릭터명 입력"/></div>
        <div><label class="${labelClass}">클래스 선택</label>
          <select class="${inputClass}" onchange="update('className',this.value)">
            <option value="">클래스 선택</option>${classOpts}
          </select></div>
        <div class="rounded-2xl border border-slate-700 bg-[#1b2745] p-4">
          <button type="button" onclick="isBartemImportOpen=!isBartemImportOpen;renderContent()" class="w-full rounded-xl bg-sky-500 px-4 py-3 text-sm font-bold text-white transition hover:bg-sky-400">바로템에 등록된 정보 가져오기</button>
          <div class="mt-2 text-xs text-slate-400">* 등록된 정보를 반영하여 자동으로 입력됩니다</div>
          ${bartemPanel}
        </div>
      </div>
    </section>
  </div>`;
}

function renderStep1() {
  const accountTypes = ["구글","퍼플","전화번호","페이스북","엔씨"];
  const accountHistories = ["본인 1대","거래 이력 있음"];
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">기본 판매 정보</h2>
      <div class="space-y-4">
        <div><label class="${labelClass}">현재 레벨</label>
          <input class="${inputClass}" data-key="level" value="${form.level}" oninput="update('level',this.value)" placeholder="예: 89"/></div>
        <div><label class="${labelClass}">전투력 <span class="text-xs text-slate-400">(캐릭터 정보 기준)</span></label>
          <input class="${inputClass}" data-key="combatPower" value="${form.combatPower}" oninput="update('combatPower',this.value)" placeholder="예: 32767"/>
          <div class="mt-1 text-xs text-slate-400">※ 실제 성능은 아래 스탯/스킬 기준으로 판단됩니다</div></div>
        <div><label class="${labelClass}">판매 가격</label>
          <input class="${inputClass}" data-key="price" value="${form.price}" oninput="update('price',this.value)" placeholder="예: 250000"/></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="${labelClass}">계정 종류</label>
            <select class="${inputClass}" onchange="update('accountType',this.value)">
              ${accountTypes.map(t=>`<option${form.accountType===t?" selected":""}>${t}</option>`).join("")}
            </select></div>
          <div><label class="${labelClass}">계정 이력</label>
            <select class="${inputClass}" onchange="update('accountHistory',this.value)">
              ${accountHistories.map(t=>`<option${form.accountHistory===t?" selected":""}>${t}</option>`).join("")}
            </select></div>
        </div>
      </div>
    </section>
  </div>`;
}

function renderStep2() {
  const combatFields = [
    ["nearbyDamage","근거리 데미지"],["rangedDamage","원거리 데미지"],
    ["accuracy","명중"],["sp","SP"],["ac","AC"],["mr","MR"]
  ];
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">핵심 전투 스펙</h2>
      <div class="grid grid-cols-2 gap-3">
        ${combatFields.map(([k,l])=>`<div><label class="${labelClass}">${l}</label>
          <input class="${inputClass}" data-key="${k}" value="${form[k]||""}" oninput="update('${k}',this.value)" placeholder="숫자 입력"/></div>`).join("")}
      </div>
    </section>
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">기본 스탯</h2>
      <div class="grid grid-cols-2 gap-3">
        ${statFields.map(([code,title])=>`<div><label class="${labelClass}">${code} (${title})</label>
          <input class="${inputClass}" data-key="${code.toLowerCase()}" value="${form[code.toLowerCase()]||""}" oninput="update('${code.toLowerCase()}',this.value)" placeholder="${code} 수치"/></div>`).join("")}
      </div>
    </section>
  </div>`;
}

function renderStep3() {
  const skillRows = [["mythSkill","신화 스킬 수"],["legendSkill","전설 스킬 수"],["heroSkill","영웅 스킬 수"]];
  const collectRows = [["transformInfo","변신"],["dollInfo","마법인형"],["relicInfo","성물"]];
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">스킬 정보</h2>
      <div class="grid grid-cols-3 gap-3">
        ${skillRows.map(([k,l])=>`<div><label class="${labelClass}">${l}</label>
          <input class="${inputClass}" data-key="${k}" value="${form[k]||""}" oninput="update('${k}',this.value)" placeholder="0"/></div>`).join("")}
      </div>
      <div class="mt-4"><label class="${labelClass}">주요 스킬명 <span class="text-xs text-slate-400">(선택)</span></label>
        <textarea class="${inputClass} min-h-[96px] resize-none" data-key="mainSkills" oninput="update('mainSkills',this.value)" placeholder="선택 입력">${form.mainSkills||""}</textarea></div>
    </section>
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">변신 / 마법인형 / 성물 <span class="text-xs text-slate-400">(간략 입력)</span></h2>
      <div class="space-y-3">
        ${collectRows.map(([k,t])=>`<div class="rounded-2xl border border-slate-700 bg-[#1b2745] p-4">
          <label class="${labelClass}">${t}</label>
          <textarea class="${inputClass} min-h-[84px] resize-none" data-key="${k}" oninput="update('${k}',this.value)" placeholder="예: 전설 3 / 신화 1">${form[k]||""}</textarea>
        </div>`).join("")}
      </div>
    </section>
  </div>`;
}

function renderStep4() {
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">장비 정보 <span class="text-xs text-slate-400">(핵심만)</span></h2>
      <div class="space-y-4">
        <input class="${inputClass}" data-key="weapon" value="${form.weapon||""}" oninput="update('weapon',this.value)" placeholder="주요 무기 입력"/>
        <input class="${inputClass}" data-key="armor" value="${form.armor||""}" oninput="update('armor',this.value)" placeholder="주요 방어구 입력"/>
        <input class="${inputClass}" data-key="accessories" value="${form.accessories||""}" oninput="update('accessories',this.value)" placeholder="주요 악세 입력"/>
      </div>
    </section>
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">재화 / 추가 가치 요소</h2>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <input class="${inputClass}" data-key="adena" value="${form.adena||""}" oninput="update('adena',this.value)" placeholder="아데나"/>
          <input class="${inputClass}" data-key="diamond" value="${form.diamond||""}" oninput="update('diamond',this.value)" placeholder="다이아"/>
        </div>
        <textarea class="${inputClass} min-h-[100px] resize-none" data-key="collection" oninput="update('collection',this.value)" placeholder="컬렉션 / 문양 / 휘장 / 숙련 등 추가 가치 요소 입력">${form.collection||""}</textarea>
      </div>
    </section>
  </div>`;
}

function renderStep5() {
  const tradeMethods = ["이메일 변경 후 인계","계정 정보 양도","선물하기 포함 거래"];
  const supports = ["1회 지원","3일 지원","지원 불가"];
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">거래 방식</h2>
      <div class="grid gap-3">
        ${tradeMethods.map(m=>choiceBtn("tradeMethod",m,m)).join("")}
      </div>
    </section>
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">거래 안정성</h2>
      <div class="space-y-3">
        ${toggleRow("결제내역 있음","paymentHistory")}
        ${toggleRow("이중연동 없음","doubleLinked",true)}
        ${toggleRow("선물 가능","giftAvailable")}
        ${toggleRow("복구 이력 없음","recoverySafe")}
        ${toggleRow("활동 정지 / 제재 경험 없음","sanctionFree")}
      </div>
    </section>
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">판매자 설명</h2>
      <div class="space-y-4">
        <div><label class="${labelClass}">거래 후 지원</label>
          <select class="${inputClass}" onchange="update('afterSupport',this.value)">
            ${supports.map(s=>`<option${form.afterSupport===s?" selected":""}>${s}</option>`).join("")}
          </select></div>
        <textarea class="${inputClass} min-h-[140px] resize-none" data-key="description" oninput="update('description',this.value)"
          placeholder="구매자가 바로 이해할 수 있도록 핵심 내용을 입력해 주세요. 예: 89렙 뇌신 / 전설 변신·인형·성물 / 선물 가능 / 복구 이력 없음">${form.description||""}</textarea>
      </div>
    </section>
  </div>`;
}

function renderStep6() {
  const checks = ["계정 소유권이 본인임을 확인합니다","입력한 정보가 정확함을 확인합니다","거래 규정에 동의합니다"];
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">증빙 자료 등록</h2>
      <div class="grid grid-cols-2 gap-3">
        ${uploadSlots.map(slot=>`
          <button type="button" class="rounded-2xl border border-dashed border-slate-600 bg-[#1b2745] p-4 text-left transition hover:border-amber-400">
            <div class="mb-2 text-sm font-bold text-white">${slot}</div>
            <div class="flex h-24 items-center justify-center rounded-2xl bg-[#202d4d] text-xs text-slate-400">클릭하여 등록</div>
          </button>`).join("")}
      </div>
    </section>
    <section class="${sectionCard} p-4">
      <h2 class="mb-4 text-lg font-black text-white">확인 사항</h2>
      <div class="space-y-3">
        ${checks.map(item=>`<label class="flex items-center gap-3 rounded-2xl border border-slate-700 bg-[#1b2745] px-4 py-4 text-sm text-slate-100">
          <input type="checkbox" class="h-4 w-4 rounded"/> ${item}</label>`).join("")}
      </div>
    </section>
  </div>`;
}

function renderStep7() {
  const ranged = ["요정","총사"].includes(form.className);
  const dmg = ranged ? (form.rangedDamage||"-") : (form.nearbyDamage||"-");
  const summaryItems = [
    ["서버",form.server||"-"],["서버 상세",form.serverDetail||"-"],
    ["캐릭터명",form.characterName||"-"],["클래스",form.className||"-"],
    ["레벨",form.level||"-"],["전투력",form.combatPower||"-"],
    ["판매가",form.price?`${form.price}원`:"-"],
    ["계정 종류",form.accountType||"-"],["계정 이력",form.accountHistory||"-"],
    ["핵심 전투 스펙",`${dmg} / ${form.accuracy||"-"} / ${form.sp||"-"}`],
  ];
  return `<div class="space-y-3">
    <section class="${sectionCard} p-4">
      <h3 class="mb-4 text-lg font-black text-white">입력 정보 요약</h3>
      <div class="grid grid-cols-2 gap-3">
        ${summaryItems.map(([k,v])=>`<div class="rounded-2xl border border-slate-700 bg-[#1b2745] px-4 py-3">
          <div class="text-[11px] text-slate-500">${k}</div>
          <div class="mt-1 text-sm font-bold text-white">${v}</div>
        </div>`).join("")}
      </div>
    </section>
    <section class="${sectionCard} p-4">
      <h3 class="mb-4 text-lg font-black text-white">판매 설명</h3>
      <div class="rounded-2xl border border-slate-700 bg-[#1b2745] px-4 py-4 text-sm leading-6 text-slate-200">${form.description||"입력된 판매 설명이 없습니다."}</div>
    </section>
  </div>`;
}

function getStepHTML() {
  const fns = [renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6,renderStep7];
  return (fns[step]||renderStep7)();
}

// ─── 콘텐츠 영역만 교체 (스크롤 위치 유지) ────────────────────────────────────
function renderContent() {
  const area = document.getElementById("content-area");
  if (!area) return;
  // 포커스 중인 input의 key와 selectionStart를 기억
  const focused = document.activeElement;
  const focusKey = focused ? focused.dataset.key : null;
  const focusSel = focused ? focused.selectionStart : null;

  area.innerHTML = `<div class="fade-up max-w-2xl mx-auto">${getStepHTML()}</div>`;

  // 포커스 복원
  if (focusKey) {
    const el = area.querySelector(`[data-key="${focusKey}"]`);
    if (el) {
      el.focus();
      if (focusSel !== null && el.setSelectionRange) {
        try { el.setSelectionRange(focusSel, focusSel); } catch(e){}
      }
    }
  }
}

// ─── 최초 전체 렌더 (1회만 실행) ──────────────────────────────────────────────
function renderAll() {
  const complete = isStepComplete(step);
  const isLast = step === steps.length - 1;

  const navBtns = steps.map((item,idx) => {
    const active = idx === step;
    const done = idx < step && isStepComplete(idx);
    const cls = done ? "border-emerald-400 bg-emerald-500/15 text-emerald-300"
      : active ? "border-amber-400 bg-amber-500/15 text-amber-300"
      : "border-slate-700 bg-[#1b2745] text-slate-300";
    const dotCls = done ? "bg-emerald-400 text-slate-950" : active ? "bg-amber-400 text-slate-950" : "bg-slate-700 text-white";
    return `<button type="button" data-step-index="${idx}" onclick="setStep(${idx})"
      class="flex items-center gap-2 rounded-full border px-3 py-2 text-xs font-bold transition ${cls}">
      <span class="step-dot flex h-5 w-5 items-center justify-center rounded-full text-[11px] ${dotCls}">${done?"✓":idx+1}</span>
      <span>${item.title}</span>
    </button>`;
  }).join("");

  const prevCls = "w-[160px] rounded-2xl border px-5 py-4 text-sm font-bold text-center border-slate-800 bg-slate-900 text-slate-600 cursor-not-allowed";
  const nextCls = (!isLast && !complete)
    ? "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500/40 text-slate-800 cursor-not-allowed"
    : "w-[200px] rounded-2xl px-5 py-4 text-sm font-black text-center bg-amber-500 text-slate-950";

  document.getElementById("root").innerHTML = `
  <div class="mx-auto h-[100dvh] w-full overflow-hidden bg-[#091431] text-white shadow-[0_30px_80px_rgba(0,0,0,0.45)] flex flex-col lg:h-[calc(100dvh-48px)] lg:max-w-[1280px] lg:rounded-[32px] lg:border lg:border-slate-800">

    <div class="shrink-0 border-b border-slate-800 bg-[#091431]/95 px-4 pb-4 pt-5 backdrop-blur lg:px-6 lg:pb-5 lg:pt-6">
      <div class="max-w-2xl mx-auto">
        <div class="mb-4 flex items-center gap-3 lg:mb-5">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-[#0ea5e9] shadow-md">
            <span class="text-lg font-black text-white">M</span>
          </div>
          <h1 class="text-[26px] font-black tracking-tight text-white lg:text-[30px]">리니지M 계정 판매</h1>
        </div>
        <div id="step-nav-wrap" class="overflow-x-auto pb-1 hide-scrollbar cursor-grab active:cursor-grabbing select-none">
          <div id="step-nav" class="flex min-w-max items-center gap-2">${navBtns}</div>
        </div>
        <div class="mt-4">
          <div class="text-xs font-semibold text-slate-400">STEP ${step+1} / ${steps.length}</div>
          <div id="step-title" class="mt-1 text-lg font-black text-white">${steps[step].title}</div>
          <div id="step-warn" class="mt-1 text-xs text-rose-300" style="${(!complete && step < steps.length-1)?'':'display:none'}">필수 입력값을 채워야 다음 단계로 이동할 수 있습니다.</div>
        </div>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <div id="content-area" class="flex-1 overflow-y-auto px-4 py-4 hide-scrollbar lg:px-6 lg:py-5">
        <div class="fade-up max-w-2xl mx-auto">${getStepHTML()}</div>
      </div>
    </div>

    <div class="shrink-0 border-t border-slate-800 bg-[#091431]/95 px-4 py-4 backdrop-blur lg:px-6 lg:py-5">
      <div class="max-w-2xl mx-auto flex justify-center gap-3">
        <button id="btn-prev" type="button" onclick="goPrev()" disabled class="${prevCls}">← 이전</button>
        <button id="btn-next" type="button" class="${nextCls}">${isLast?"판매 등록하기":"다음 →"}</button>
      </div>
    </div>
  </div>`;

  // btn-next onclick 설정
  const nextBtn = document.getElementById("btn-next");
  nextBtn.onclick = isLast ? ()=>alert('판매 등록이 완료되었습니다!') : goNext;

  // 스텝 네비 스와이프 (마우스 + 터치)
  const navWrap = document.getElementById("step-nav-wrap");
  if (navWrap) {
    let isDown = false, startX = 0, scrollLeft = 0;
    navWrap.addEventListener("mousedown", e => {
      isDown = true; startX = e.pageX - navWrap.offsetLeft; scrollLeft = navWrap.scrollLeft;
    });
    navWrap.addEventListener("mouseleave", () => isDown = false);
    navWrap.addEventListener("mouseup", () => isDown = false);
    navWrap.addEventListener("mousemove", e => {
      if (!isDown) return; e.preventDefault();
      navWrap.scrollLeft = scrollLeft - (e.pageX - navWrap.offsetLeft - startX);
    });
    navWrap.addEventListener("touchstart", e => {
      startX = e.touches[0].pageX; scrollLeft = navWrap.scrollLeft;
    }, {passive:true});
    navWrap.addEventListener("touchmove", e => {
      navWrap.scrollLeft = scrollLeft - (e.touches[0].pageX - startX);
    }, {passive:true});
  }

  // input에 data-key 추가 (renderContent에서도 포커스 복원에 사용)
  // -> 각 renderStep 함수 내 input/textarea에 직접 data-key 삽입
}

// ─── input/textarea에 data-key 추가를 위한 래퍼 ─────────────────────────────
// renderContent 호출 후 data-key가 없는 요소에 자동 부여
// (대신 각 renderStep에서 oninput 이벤트가 update()를 호출할 때 key를 넘기므로
//  포커스 복원용으로만 data-key를 쓴다. 아래처럼 oninput 앞에 this.dataset.key 설정)
// -> 이미 각 input에 oninput 내에서 key를 명시하고 있으므로,
//    data-key를 HTML에 직접 추가하는 방식으로 처리.
// (renderStep 함수들의 input에 data-key="..." 속성 추가는 위에서 완료)

renderAll();
</script>
</body>
</html>
